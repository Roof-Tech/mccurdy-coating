services:
  - type: web
    name: mccurdy-coatings
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: OWNER_EMAIL
        value: mschirmer1922@gmail.com
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
    disk:
      name: mccurdy-data
      mountPath: /var/data
      sizeGB: 1
