services:
  - type: web
    name: mccurdy-coatings
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: mccurdy-data
      mountPath: /var/data
      sizeGB: 1
